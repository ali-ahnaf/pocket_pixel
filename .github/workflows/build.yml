name: Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Build API
        run: npm run build:api

      - name: Build UI
        run: npm run build:client
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    name: Deploy to Hostinger VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.HOSTINGER_VPS_HOST }}
      VPS_PORT: ${{ secrets.HOSTINGER_VPS_PORT }}
      VPS_USER: ${{ secrets.HOSTINGER_VPS_USER }}
      VPS_APP_DIR: ${{ secrets.HOSTINGER_VPS_APP_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "${VPS_PORT:-22}" "$VPS_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $VPS_HOST
            User $VPS_USER
            Port ${VPS_PORT:-22}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            PreferredAuthentications publickey
            BatchMode yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify SSH access
        run: ssh deploy-target "mkdir -p '$VPS_APP_DIR'"

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'pocket_pixel.sqlite' \
            ./ "deploy-target:$VPS_APP_DIR/"

      - name: Run remote deploy commands
        run: |
          ssh deploy-target <<EOF
          set -eu
          cd "$VPS_APP_DIR"
          npm install
          npm run migration:run-prod
          npm run build:shared
          npm run build:client
          pm2 startOrRestart ecosystem.config.js --env production
          pm2 save
          EOF
