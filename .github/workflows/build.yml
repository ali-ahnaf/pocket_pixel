name: Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Build API
        run: npm run build:api

      - name: Build UI
        run: npm run build:client
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    name: Deploy to Hostinger VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.HOSTINGER_VPS_HOST }}
      VPS_USER: ${{ secrets.HOSTINGER_VPS_USER }}
      VPS_APP_DIR: ${{ secrets.HOSTINGER_VPS_APP_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p 22 "$VPS_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          ssh -p 22 "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          rsync -az --delete \
            -e "ssh -p 22" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'pocket_pixel.sqlite' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Run remote deploy commands
        run: |
          ssh -p 22 "$VPS_USER@$VPS_HOST" <<EOF
          set -eu
          cd "$VPS_APP_DIR"
          npm install
          npm run migration:run-prod
          npm run build:shared
          npm run build:client
          pm2 startOrRestart ecosystem.config.js --env production
          pm2 save
          EOF
