name: PR Merge Gratitude Herald

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  thank-author:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Thank the author of a merged pull request
        uses: actions/github-script@v7
        with:
          script: |
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const pr = context.payload.pull_request;
            const number = pr.number;
            const author = pr.user.login;

            // The wizard's seal, so repeated runs do not re-bless the same scroll.
            const MARKER = '<!-- merge-gratitude-herald -->';

            const { data: comments } = await github.rest.issues.listComments({
              ...common,
              issue_number: number,
              per_page: 100,
            });
            const alreadyThanked = comments.some((comment) => (comment.body || '').includes(MARKER));
            if (alreadyThanked) {
              core.info(`PR #${number} already bears the herald's gratitude. Skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              ...common,
              issue_number: number,
              body: `${MARKER}\nThe quest is sealed, @${author}! Thy incantations have been woven into the main path. The realm grows stronger for thy contribution — accept the gratitude of this humble keeper of the codex. May thy commits forever merge cleanly, brave adventurer 💰`,
            });

            core.info(`Thanked @${author} for merged PR #${number}.`);
