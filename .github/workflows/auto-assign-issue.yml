name: Auto Assign Issue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  auto-assign:
    # Only run on comments made on issues (not pull requests).
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue to interested commenter
        uses: actions/github-script@v7
        with:
          script: |
            const triggers = ['interested', 'assign'];
            const body = (context.payload.comment.body || '').toLowerCase();
            const wantsAssignment = triggers.some((word) => body.includes(word));

            if (!wantsAssignment) {
              core.info('Comment does not request assignment. Skipping.');
              return;
            }

            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            };

            // Prevent multiple people from claiming the same issue.
            if (issue.assignees && issue.assignees.length > 0) {
              core.info(`Issue #${issue.number} already has an assignee. Skipping.`);
              return;
            }

            // Complicated issues are gated — do not auto-assign.
            const gatedLabels = ['epic', 'important'];
            const labels = (issue.labels || []).map((label) =>
              (typeof label === 'string' ? label : label.name).toLowerCase(),
            );
            const isGated = labels.some((label) => gatedLabels.includes(label));

            if (isGated) {
              await github.rest.issues.createComment({
                ...common,
                body: `Greetings @${commenter}, this quest is shrouded in dark magic. The council shall deliberate and send word whether thou art ready to undertake it.`,
              });
              core.info(`Issue #${issue.number} is gated by labels. Posted holding comment.`);
              return;
            }

            await github.rest.issues.addAssignees({
              ...common,
              assignees: [commenter],
            });

            await github.rest.issues.createComment({
              ...common,
              body: `Greetings @${commenter}, this quest now bears thy name. May thy code compile and thy bugs be few!`,
            });

            core.info(`Assigned issue #${issue.number} to ${commenter}.`);
