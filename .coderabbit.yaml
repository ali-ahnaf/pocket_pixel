# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    # Enable auto-review on PRs targeting branches other than the default.
    # Patterns are matched against the PR's base (target) branch.
    base_branches:
      - main
      - develop
      - "feat/.*"
      - "fix/.*"
      - "release/.*"
chat:
  auto_reply: true
